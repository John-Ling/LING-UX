services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`terminal.johnling.me`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - dokploy-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=https://terminal.johnling.me/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`terminal.johnling.me`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network
  
  session-container:
    build:
      context: .
      dockerfile: docker/session-container/Dockerfile
    image: lingux-session-container:latest
    command: ["echo", "build complete"]

networks:
  dokploy-network:
    external: true